<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitFlow | Dashboard</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="../assets/css/styles.css?v=5">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <a class="brand-mark" href="./dashboard.html">HabitFlow</a>
            <nav class="sidebar-nav">
                <a class="nav-link active" href="./dashboard.html?v=5">Dashboard</a>
                <a class="nav-link" href="./habits.html?v=5">Habits</a>
                <a class="nav-link" href="./calendar.html?v=5">Calendar</a>
                <a class="nav-link" href="./insights.html?v=5">Insights</a>
                <a class="nav-link" href="./profile.html?v=5">Profile</a>
            </nav>
            <button id="logoutButton" class="ghost-button">Logout</button>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <p class="eyebrow">Today</p>
                    <h1>Your daily view</h1>
                </div>
                <a class="primary-button" href="./habits.html?v=5">Manage Habits</a>
            </header>

            <section class="stats-grid" id="statsGrid"></section>

            <section class="insight-grid">
                <article class="card insight-card">
                    <div class="section-heading">
                        <h2>Today’s Check-In</h2>
                        <p>Quick complete or incomplete toggles for habits due today.</p>
                    </div>
                    <div id="todayHabitList" class="habit-list"></div>
                </article>

                <article class="card insight-card">
                    <div class="section-heading">
                        <h2>Last 7 Days</h2>
                        <p>A simple view of how consistently you’ve been showing up this week.</p>
                    </div>
                    <div id="dashboardGraph" class="chart-card"></div>
                </article>
            </section>
        </main>
    </div>

    <p id="dashboardMessage" class="toast" aria-live="polite"></p>

    <script type="module" src="../assets/js/dashboard.js?v=5"></script>
</body>
</html>
