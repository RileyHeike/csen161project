<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HabitFlow | Profile</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="../assets/css/styles.css?v=5">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <a class="brand-mark" href="./dashboard.html">HabitFlow</a>
            <nav class="sidebar-nav">
                <a class="nav-link" href="./dashboard.html?v=5">Dashboard</a>
                <a class="nav-link" href="./habits.html?v=5">Habits</a>
                <a class="nav-link" href="./calendar.html?v=5">Calendar</a>
                <a class="nav-link" href="./insights.html?v=5">Insights</a>
                <a class="nav-link active" href="./profile.html?v=5">Profile</a>
            </nav>
            <button id="logoutButton" class="ghost-button">Logout</button>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <p class="eyebrow">Account</p>
                    <h1>Your profile</h1>
                </div>
            </header>

            <section class="stats-grid" id="profileSummary"></section>

            <section class="insight-grid">
                <article class="card insight-card">
                    <div class="section-heading">
                        <h2>Basic Info</h2>
                        <p>Your main account details.</p>
                    </div>
                    <div id="profileInfo" class="insight-list"></div>
                </article>

                <article class="card insight-card">
                    <div class="section-heading">
                        <h2>Activity Snapshot</h2>
                        <p>A quick look at your account activity so far.</p>
                    </div>
                    <div id="profileActivity" class="insight-list"></div>
                </article>
            </section>
        </main>
    </div>

    <p id="profileMessage" class="toast" aria-live="polite"></p>

    <script type="module" src="../assets/js/profile.js?v=5"></script>
</body>
</html>
